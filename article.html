<script>
  function toggleDark() {
    var isDark = document.body.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    document.getElementById('dark-toggle').textContent = isDark ? '☀ Light' : '🌙 Dark';
  }
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('dark-toggle').textContent = '☀ Light';
  }

  var articles = [
    {
      id: 1, tag: 'Drug Safety', date: 'May 10, 2026', read: '6 min',
      title: 'The five drug combinations GPs miss most often',
      img: 'https://images.unsplash.com/photo-1628595351029-c2bf17511435?w=900&q=80',
      alt: 'A pharmacist comparing two medicine bottles',
      body: `
        <p>Most dangerous drug interactions are rare. But a handful of combinations appear again and again in general practice — and they are preventable. We analysed five years of EMA adverse event reports to find them.</p>
        <h2>1. Metformin and iodine contrast agents</h2>
        <p>Patients with type 2 diabetes scheduled for imaging with contrast dye risk contrast-induced nephropathy, which causes metformin to build up to toxic levels. The fix is to pause metformin 48 hours before and after the scan — but this communication often falls through the gap between the GP and the radiologist.</p>
        <h2>2. ACE inhibitors and potassium-sparing diuretics</h2>
        <p>Both classes raise serum potassium. Combined in older patients with reduced kidney function, the result can be dangerous hyperkalaemia. This combination requires regular monitoring that does not always happen in a busy practice.</p>
        <h2>3. SSRIs and tramadol</h2>
        <p>This combination carries a risk of serotonin syndrome. It is frequently missed because the two drugs are often prescribed by different specialists with no shared record system.</p>
        <h2>4. Warfarin and NSAIDs</h2>
        <p>NSAIDs increase bleeding risk by inhibiting platelets and irritating the gastric mucosa. Even a short course of over-the-counter ibuprofen can be significant with warfarin — and patients often add it without mentioning it.</p>
        <h2>5. Beta-blockers and salbutamol</h2>
        <p>Non-selective beta-blockers can reduce the effect of salbutamol, which matters for patients with both cardiac conditions and asthma. Cardioselective beta-blockers are preferred, but the distinction is not always made at the point of prescribing.</p>
      `
    },
    {
      id: 2, tag: 'AI in Medicine', date: 'April 28, 2026', read: '8 min',
      title: 'Why AI will not replace your doctor — and what it will do instead',
      img: 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=900&q=80',
      alt: 'A doctor typing notes on a laptop',
      body: `
        <p>Headlines about AI in healthcare tend toward extremes. Either AI will make doctors obsolete within a decade, or it is overhyped technology that will never work in a real clinic. The truth is more practical.</p>
        <h2>What AI is actually doing in clinics today</h2>
        <p>The AI systems deployed in general practice are not diagnosing cancer. They are handling the parts of medicine that were never really medicine: formatting letters, retrieving patient records, flagging drug interactions, reminding doctors about overdue blood tests. These tasks are administrative, consume 30 to 40 percent of a doctor's day, and require consistency rather than clinical judgment.</p>
        <h2>The limits of current AI</h2>
        <p>Ask an AI to assess a patient with fatigue, mild chest tightness, and a recent bereavement, and it will struggle. Not because it lacks data, but because a good consultation involves trust, reading what a patient is not saying, and contextual reasoning that language models cannot replicate.</p>
        <h2>What actually changes</h2>
        <p>Doctors get more time back for the parts of medicine that require them. If AI handles notes and record retrieval, there is more space for the conversation. That is not a replacement — it is a redistribution of effort toward where it matters most.</p>
      `
    },
    {
      id: 3, tag: 'Compliance', date: 'April 5, 2026', read: '10 min',
      title: 'What the EU AI Act means for medical software in 2026',
      img: 'https://images.unsplash.com/photo-1563986768494-4dee2763ff3f?w=900&q=80',
      alt: 'A digital padlock representing data security',
      body: `
        <p>The EU AI Act came into full force in August 2026. For companies building AI tools used in healthcare, the obligations are clear and demanding.</p>
        <h2>What counts as high-risk</h2>
        <p>AI systems that assist in clinical decision-making — drug interaction checks, symptom assessment, AI-generated notes — are classified as high-risk. This does not mean they are banned. It means they must meet a defined set of requirements before going to market, and keep meeting them while in use.</p>
        <h2>The main requirements</h2>
        <p>Four obligations matter most: a documented risk management system; technical documentation explaining how the model works and how it was validated; logging of outputs for auditing; and human oversight so that a clinician remains in control of every decision.</p>
        <h2>GDPR still applies</h2>
        <p>The AI Act sits on top of GDPR — not instead of it. Patient data remains health data under Article 9, requiring explicit consent, EU-based storage, and data processing agreements with any third party.</p>
        <h2>Questions to ask any vendor</h2>
        <p>Can you provide AI Act conformity documentation? Where is patient data stored? How does your system ensure the doctor stays responsible for every decision? If a vendor cannot answer clearly, they are not compliant.</p>
      `
    },
    {
      id: 4, tag: 'Patient Care', date: 'March 20, 2026', read: '5 min',
      title: 'How better data leads to better consultations',
      img: 'https://images.unsplash.com/photo-1559757175-0eb30cd8c063?w=900&q=80',
      alt: 'A doctor speaking with an elderly patient',
      body: `
        <p>When a doctor enters a consultation already knowing a patient's medication history, symptom trends, and past visit notes, the conversation changes. The patient does not notice, but the quality of what happens in those fifteen minutes improves in measurable ways.</p>
        <h2>The problem with starting from zero</h2>
        <p>In many practices, a consultation begins with the doctor opening a record system that shows appointments and a medication list — but no easy way to see the pattern across both. Is this patient's blood pressure stable over six months? Did the dose adjustment in February have any effect? Answering these questions during a live appointment takes time the appointment does not have.</p>
        <p>Doctors end up asking patients to reconstruct their own history. Patients do their best, but memory is unreliable, especially for those managing multiple conditions. Important context gets lost.</p>
        <h2>What changes when the data is ready</h2>
        <p>When a symptom trend chart is ready before the appointment, the doctor arrives with a hypothesis rather than a blank page. The first five minutes go toward understanding what changed since the last visit — not gathering information the system already holds. When doctors are not busy retrieving data, they pay more attention to the person in front of them.</p>
      `
    },
    {
      id: 5, tag: 'Productivity', date: 'March 8, 2026', read: '7 min',
      title: 'A day in the life of a GP using Docly',
      img: 'https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04?w=900&q=80',
      alt: 'A hand writing medical notes on paper',
      body: `
        <p>We followed Dr. Sophie M. through a full Tuesday in her practice in Paris. Eighteen patients, two urgent calls, one difficult prescribing decision. This is what her day looks like — in her own words.</p>
        <h2>8:45 — Before the first patient</h2>
        <p>"I open the dashboard while I drink my coffee. I can see who is coming in and whether there are any alerts. Today Docly flagged a potential interaction for my third patient — someone added a new medication and the system caught a lactic acidosis risk with his metformin. I check his kidney results before he arrives."</p>
        <h2>10:00 — The consultation</h2>
        <p>"When he comes in I already know what to ask. We spend the time talking about how he has been feeling. I do not ask him to remind me what medications he takes. He is 71 — that is not a fair question. The summary from his last visit is right there."</p>
        <h2>13:00 — Lunch that actually happens</h2>
        <p>"The morning consultations are already summarised. I review and approve them — about twelve minutes for nine patients. Before Docly it was closer to 45."</p>
        <h2>17:30 — End of day</h2>
        <p>"I leave at a reasonable time. That sounds small. It is not small. I have been a GP for eleven years. I am less tired on a Tuesday evening than I was three years ago."</p>
      `
    },
    {
      id: 6, tag: 'Research', date: 'February 14, 2026', read: '9 min',
      title: 'Does AI-assisted prescribing reduce adverse events?',
      img: 'https://images.unsplash.com/photo-1582719471384-894fbb16e074?w=900&q=80',
      alt: 'Two doctors reviewing data on a shared screen',
      body: `
        <p>Three peer-reviewed studies from 2024 and 2025 looked at whether AI decision support in prescribing actually reduces patient harm. The results are promising, with caveats worth understanding.</p>
        <h2>Netherlands — primary care (2024)</h2>
        <p>A randomised trial across 42 general practices found a 31% reduction in high-severity drug interaction events in the AI-supported group over twelve months. The benefit was concentrated in patients over 65 taking five or more medications simultaneously.</p>
        <h2>UK — hospital inpatients (2024)</h2>
        <p>A retrospective analysis of 18,000 admissions found that AI-flagged alerts led to a prescribing change in 44% of high-severity cases. Alert fatigue was a significant problem — too many low-severity alerts caused clinicians to start dismissing the important ones. Calibration matters as much as accuracy.</p>
        <h2>Germany — outpatient oncology (2025)</h2>
        <p>AI-assisted review caught clinically relevant interactions in 18% of patient medication lists — interactions that the standard pharmacy review had not identified. The most common missed interaction involved chemotherapy agents and antifungal medications.</p>
        <h2>What this means</h2>
        <p>AI interaction checking adds real clinical value, especially for high-risk patients. But it does not replace pharmacist review or clinical judgment. In all three studies, the doctor remained in the decision loop. The AI flagged the risk — the doctor decided what to do.</p>
      `
    }
  ];


  function render() {
    var id      = parseInt(window.location.hash.replace('#', ''));
    var article = articles.find(function(a) { return a.id === id; });

    if (!article) {
      document.getElementById('page').innerHTML =
        '<div class="container" style="padding:80px 0;">' +
        '<a href="blog.html" style="color:#1a73e8;">&larr; Back to blog</a>' +
        '<p class="mt-4 text-muted">Article not found.</p></div>';
      return;
    }

    document.title = article.title + ' - Docly';
    window.scrollTo(0, 0);

    document.getElementById('page').innerHTML =
      '<section style="padding:60px 0 40px; border-bottom:1px solid #e0e0e0; background:#f8f9fa;">' +
        '<div class="container">' +
          '<a href="blog.html" style="color:#1a73e8; font-size:0.9rem; font-weight:600;">&larr; Back to blog</a>' +
          '<div class="mt-3 mb-2"><span class="tag">' + article.tag + '</span></div>' +
          '<h1 style="font-size:clamp(1.6rem,3.5vw,2.4rem); max-width:680px;">' + article.title + '</h1>' +
          '<p class="text-muted mt-2" style="font-size:0.85rem;">' + article.date + ' &mdash; ' + article.read + ' read</p>' +
          '<img src="' + article.img + '" alt="' + article.alt + '" class="img-fluid rounded mt-4" style="border:1px solid #e0e0e0; max-width:780px;" />' +
        '</div>' +
      '</section>' +
      '<section><div class="container"><div class="article-body">' + article.body + '</div></div></section>';
  }

  render();
  window.addEventListener('hashchange', render);

</script>
